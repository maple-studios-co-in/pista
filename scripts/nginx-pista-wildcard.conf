# One block serves every café subdomain *.pista.maplestudios.co.in
# Requires the wildcard cert from WILDCARD_TLS.md (acme.sh + Cloudflare DNS-01).

server {
    listen 80;
    listen [::]:80;
    server_name ~^(?<sub>[^.]+)\.pista\.maplestudios\.co\.in$;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name ~^(?<sub>[^.]+)\.pista\.maplestudios\.co\.in$;
    client_max_body_size 30m;

    ssl_certificate     /etc/ssl/pista/wildcard.crt;
    ssl_certificate_key /etc/ssl/pista/wildcard.key;

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
